name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-checks:
    name: Server Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blink-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: blink-server/node_modules
          key: server-node-modules-${{ hashFiles('blink-server/package-lock.json') }}
          restore-keys: |
            server-node-modules-

      - name: Install dependencies
        run: npm ci --registry https://registry.npmjs.org

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

  app-checks:
    name: App Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blink-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: blink-app/node_modules
          key: app-node-modules-${{ hashFiles('blink-app/package-lock.json') }}
          restore-keys: |
            app-node-modules-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --registry https://registry.npmjs.org

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

[build]
# Build from monorepo root to access both blink-server/ and legal/.
# Dockerfile lives at the repo root (moved from blink-server/ on 2026-05-26)
# because Railway's service-level config sets dockerfilePath="/Dockerfile"
# and was overriding the value below — keeping them in sync means deploys
# work whichever setting wins.
dockerfilePath = "Dockerfile"
watchPatterns = ["blink-server/**", "legal/**"]

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
numReplicas = 1

version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: blink_dev
      POSTGRES_USER: blink
      POSTGRES_PASSWORD: blink_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blink -d blink_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: blink-server/Dockerfile
    ports:
      - "3000:3000"
    env_file: ./blink-server/.env
    environment:
      DATABASE_URL: postgresql://blink:blink_dev_password@postgres:5432/blink_dev
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./blink-server/src:/app/src
    command: npx nodemon --exec ts-node src/index.ts

volumes:
  postgres_data:
